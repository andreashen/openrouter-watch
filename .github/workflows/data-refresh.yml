name: Refresh derived model data

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to update with refreshed data"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - main
  schedule:
    # Run every 6 hours (UTC).
    - cron: "17 */6 * * *"

permissions:
  contents: read

concurrency:
  group: data-refresh-${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || 'test' }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || 'test' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Generate automation app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Refresh pipeline outputs
        run: |
          python scripts/fetch.py
          python scripts/normalize.py
          python scripts/derive.py

      - name: Commit and push derived data
        run: |
          if git diff --quiet -- data/derived; then
            echo "No data changes detected under data/derived."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/derived
          git commit -m "chore(data): refresh derived artifacts"
          git push origin "HEAD:${TARGET_BRANCH}"
