name: Refresh weighted avg input prices

# Independent of data-refresh.yml (daily models pipeline).
# Weighted Avg Input Price changes frequently; keep it on a slower cadence
# and write only the sidecar files under data/derived/.

on:
  workflow_dispatch:
  schedule:
    # Weekly on Monday 01:17 UTC
    - cron: "17 1 * * 1"

permissions:
  contents: read

concurrency:
  group: weighted-price-refresh-main
  cancel-in-progress: false

jobs:
  refresh_weighted_prices:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TARGET_BRANCH: main
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Generate automation app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Refresh weighted price sidecar
        run: python scripts/fetch_weighted_prices.py

      - name: Commit and push sidecar data
        run: |
          if git diff --quiet -- \
            data/derived/weighted_prices_latest.json \
            data/derived/weighted_prices_meta.json; then
            echo "No weighted price sidecar changes detected."
            exit 0
          fi

          # Guardrail: models_latest.json must remain untouched by this job.
          if ! git diff --quiet -- data/derived/models_latest.json; then
            echo "::error::models_latest.json changed during weighted price refresh; aborting."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/derived/weighted_prices_latest.json data/derived/weighted_prices_meta.json
          git commit -m "chore(data): refresh weighted avg input prices"
          git push origin "HEAD:${TARGET_BRANCH}"
