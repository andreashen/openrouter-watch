name: Deploy site to GitHub Pages

on:
  push:
    branches: [main, test]
    paths:
      - "web/**"
      - "data/derived/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch (production site source)
        uses: actions/checkout@v4
        with:
          ref: main
          path: src-main

      - name: Checkout test branch (SIT site source)
        uses: actions/checkout@v4
        with:
          ref: test
          path: src-test

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            src-main/web/package-lock.json
            src-test/web/package-lock.json

      - name: Compute Astro site and bases for GitHub Pages
        id: astro
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          site="https://${owner}.github.io"
          if [ "${repo}" = "${owner}.github.io" ]; then
            prod_base="/"
            sit_base="/sit/"
            prod_url="${site}/"
            sit_url="${site}/sit/"
          else
            prod_base="/${repo}/"
            sit_base="/${repo}/sit/"
            prod_url="${site}/${repo}/"
            sit_url="${site}/${repo}/sit/"
          fi
          echo "site=${site}" >> "${GITHUB_OUTPUT}"
          echo "prod_base=${prod_base}" >> "${GITHUB_OUTPUT}"
          echo "sit_base=${sit_base}" >> "${GITHUB_OUTPUT}"
          echo "prod_url=${prod_url}" >> "${GITHUB_OUTPUT}"
          echo "sit_url=${sit_url}" >> "${GITHUB_OUTPUT}"
          echo "Using ASTRO_SITE=${site}"
          echo "Production base: ${prod_base}"
          echo "SIT base: ${sit_base}"

      - name: Build production and SIT sites
        env:
          ASTRO_SITE: ${{ steps.astro.outputs.site }}
          PROD_BASE: ${{ steps.astro.outputs.prod_base }}
          SIT_BASE: ${{ steps.astro.outputs.sit_base }}
        run: |
          set -euo pipefail
          build_site () {
            src_dir="$1"
            base="$2"
            out_dir="$3"
            echo "Building ${src_dir} with ASTRO_BASE=${base}"
            (
              cd "${src_dir}/web"
              npm ci
              ASTRO_SITE="${ASTRO_SITE}" ASTRO_BASE="${base}" npm run build
            )
            mkdir -p "${out_dir}"
            cp -R "${src_dir}/web/dist/." "${out_dir}/"
          }

          rm -rf pages-dist
          mkdir -p pages-dist

          build_site "src-main" "${PROD_BASE}" "pages-dist"
          build_site "src-test" "${SIT_BASE}" "pages-dist/sit"

      - name: Print deployment targets
        run: |
          echo "Production URL: ${{ steps.astro.outputs.prod_url }}"
          echo "SIT URL: ${{ steps.astro.outputs.sit_url }}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
