name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/derived/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Compute Astro site and base for GitHub Pages
        id: astro
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          site="https://${owner}.github.io"
          if [ "${repo}" = "${owner}.github.io" ]; then
            base="/"
          else
            base="/${repo}/"
          fi
          echo "site=${site}" >> "${GITHUB_OUTPUT}"
          echo "base=${base}" >> "${GITHUB_OUTPUT}"
          echo "Using ASTRO_SITE=${site} ASTRO_BASE=${base}"

      - name: Install and build
        env:
          ASTRO_SITE: ${{ steps.astro.outputs.site }}
          ASTRO_BASE: ${{ steps.astro.outputs.base }}
        run: |
          set -euo pipefail
          cd web
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
